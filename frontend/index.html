<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Alunos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    ul { list-style-type: none; padding: 0; }
    li { margin-bottom: 10px; }
    input { margin: 2px; }
    button { margin-left: 5px; }
    form { border: 1px solid #ccc; padding: 10px; margin-top: 10px; width: 300px; display: none; background-color: #f9f9f9; }
    .editing { background-color: #e0f7fa; padding: 10px; border-radius: 5px; }
    h2 { margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Gestão de Alunos</h1>

  <!-- Buscar aluno por ID -->
  <h2>Buscar Aluno por ID</h2>
  <div>
    <input type="number" id="buscarId" placeholder="Digite o ID do aluno">
    <button id="btnBuscar">Buscar</button>
  </div>
  <ul id="alunoEncontrado"></ul>

  <!-- Lista de todos os alunos -->
  <h2>Lista de Alunos</h2>
  <ul id="alunoList"></ul>

  <!-- Formulário de edição -->
  <form id="alunoForm" class="editing">
    <input type="hidden" id="alunoId">
    <div>
      <label>Nome:</label>
      <input type="text" id="nome" required>
    </div>
    <div>
      <label>Idade:</label>
      <input type="number" id="idade" required>
    </div>
    <div>
      <label>Curso:</label>
      <input type="text" id="curso" required>
    </div>
    <button type="submit">Salvar</button>
    <button type="button" id="cancelEdit">Cancelar</button>
  </form>

  <script src="script.js"></script>
</body>
</html>
